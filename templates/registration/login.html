<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareMate AI - 로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; min-height: 100vh; }
        .login-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        .input-group-text { cursor: pointer; background: white; border-left: none; }
        .password-input { border-right: none; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="card login-card p-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">CareMate AI</h2>
            <p class="text-muted small">진심을 다하는 건강 관리 서비스</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger small">아이디 또는 비밀번호가 틀렸습니다.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold">아이디</label>
                <input type="text" name="username" class="form-control" placeholder="아이디를 입력하세요" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">비밀번호</label>
                <div class="input-group">
                    <input type="password" name="password" id="id_password" class="form-control password-input" placeholder="비밀번호를 입력하세요" required>
                    <span class="input-group-text" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">로그인</button>
        </form>

        <div class="mt-4 text-center small">
            <span class="text-muted">계정이 없으신가요?</span>
            <a href="{% url 'signup' %}" class="text-primary text-decoration-none fw-bold ms-1">회원가입</a>
        </div>
    </div>
</div>

<script>
    // 비밀번호 보이기/감추기 스크립트
    document.getElementById('togglePassword').addEventListener('click', function() {
        const passwordField = document.getElementById('id_password');
        const eyeIcon = this.querySelector('i');
        const isPassword = passwordField.type === 'password';
        
        passwordField.type = isPassword ? 'text' : 'password';
        eyeIcon.classList.toggle('bi-eye');
        eyeIcon.classList.toggle('bi-eye-slash');
    });
</script>
</body>
</html>
