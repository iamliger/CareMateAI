{% extends "manager/base_manager.html" %}

{% block content %}
<div class="mb-4 px-2">
    <h2 class="fw-bold">카테고리 설정</h2>
    <p class="text-secondary small">서비스 내 게시판의 카테고리를 관리합니다. (CRUD 전체 지원)</p>
</div>

<div class="row g-4">
    <!-- 카테고리 리스트 (R, U, D) -->
    <div class="col-12 col-lg-8">
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-white fw-bold py-3">활성 카테고리 목록</div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4 py-3">이름</th>
                                <th>주소</th>
                                <th class="text-center">글 수</th>
                                <th class="text-end pe-4">액션</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for cat in categories %}
                            <tr>
                                <td class="ps-4 py-3 fw-bold text-dark">{{ cat.name }}</td>
                                <td><code class="small text-primary">{{ cat.slug }}</code></td>
                                <td class="text-center"><span class="badge bg-light text-dark rounded-pill">{{ cat.posts.count }}</span></td>
                                <td class="text-end pe-4">
                                    <div class="btn-group btn-group-sm">
                                        <!-- [Update] 수정 모달 버튼 -->
                                        <button class="btn btn-outline-dark" data-bs-toggle="modal" data-bs-target="#editCat{{ cat.id }}">
                                            <i class="bi bi-pencil-square"></i>
                                        </button>
                                        <a href="{% url 'post_list' cat.slug %}" class="btn btn-outline-primary" title="이동"><i class="bi bi-box-arrow-in-right"></i></a>
                                        <!-- [Delete] 삭제 버튼 -->
                                        <a href="{% url 'category_delete' cat.id %}" class="btn btn-outline-danger" onclick="return confirm('정말 삭제하시겠습니까?')"><i class="bi bi-trash-fill"></i></a>
                                    </div>
                                </td>
                            </tr>

                            <!-- 수정용 모달창 -->
                            <div class="modal fade" id="editCat{{ cat.id }}" tabindex="-1">
                                <div class="modal-dialog modal-dialog-centered">
                                    <div class="modal-content border-0 rounded-4 shadow-lg p-3">
                                        <form action="{% url 'category_update' cat.id %}" method="post">
                                            {% csrf_token %}
                                            <div class="modal-header border-0 pb-0"><h5 class="fw-bold">카테고리 수정</h5></div>
                                            <div class="modal-body">
                                                <div class="mb-3"><label class="small fw-bold">카테고리명</label><input type="text" name="name" class="form-control" value="{{ cat.name }}" required></div>
                                                <div><label class="small fw-bold">슬러그 (영문 주소)</label><input type="text" name="slug" class="form-control" value="{{ cat.slug }}" required></div>
                                            </div>
                                            <div class="modal-footer border-0">
                                                <button type="button" class="btn btn-light" data-bs-dismiss="modal">취소</button>
                                                <button type="submit" class="btn btn-primary px-4 fw-bold">수정 완료</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 카테고리 추가 (C) -->
    <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm">
            <div class="card-header fw-bold text-primary">신규 카테고리 생성</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3"><label class="form-label small fw-bold">카테고리명</label><input type="text" name="name" class="form-control" placeholder="예: 금연 상담" required></div>
                    <div class="mb-4"><label class="form-label small fw-bold">슬러그 (영문 주소)</label><input type="text" name="slug" class="form-control" placeholder="예: smoking" required></div>
                    <button type="submit" class="btn btn-primary w-100 shadow py-2">생성하기</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
