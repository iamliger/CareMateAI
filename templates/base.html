<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareMate AI | {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: "Pretendard", sans-serif; background-color: #f8fafc; color: #334155; letter-spacing: -0.02em; }
        .navbar { background: #fff; box-shadow: 0 1px 10px rgba(0,0,0,0.05); }
        #alice-helper { position: fixed; bottom: 30px; right: 30px; z-index: 1100; width: 80px; height: 80px; background: #4361ee; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 30px rgba(67, 97, 238, 0.4); animation: bounce 3s infinite; transition: 0.3s; }
        #alice-helper:hover { transform: scale(1.1); background: #3a0ca3; }
        #alice-quick-menu { position: fixed; bottom: 120px; right: 30px; z-index: 1099; width: 220px; background: white; border-radius: 20px; box-shadow: 0 15px 45px rgba(0,0,0,0.15); display: none; overflow: hidden; border: 1px solid #eee; }
        .quick-item { padding: 15px; border-bottom: 1px solid #f8f9fa; cursor: pointer; transition: 0.2s; display: flex; align-items: center; text-decoration: none; color: #333; font-size: 0.9rem; font-weight: 600; }
        .quick-item:hover { background: #f0f4ff; color: #4361ee; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-12px);} 60% {transform: translateY(-6px);} }
        #alarm-badge { position: fixed; bottom: 95px; right: 35px; background: #ff4d4d; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; font-weight: 800; z-index: 1101; display: none; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .ai-scanner { width: 60px; height: 60px; border: 5px solid #f3f3f3; border-top: 5px solid #4361ee; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .alice-modal-content { border: none; border-radius: 25px; padding: 20px; text-align: center; }
        .alice-modal-icon { font-size: 4rem; color: #4361ee; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="loadingOverlay"><div class="ai-scanner"></div><div id="loadingMsg" class="mt-3 fw-bold text-primary">처리 중...</div></div>

    <!-- 시스템 알림 모달 -->
    <div class="modal fade" id="aliceSystemModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content alice-modal-content shadow-lg text-center">
                <div class="alice-modal-icon"><i class="bi bi-robot"></i></div>
                <h5 class="fw-800" id="aliceModalTitle">알림</h5>
                <p class="small text-secondary mb-4" id="aliceModalBody"></p>
                <button type="button" class="btn btn-primary w-100 rounded-pill fw-bold" data-bs-dismiss="modal">확인하였습니다</button>
            </div>
        </div>
    </div>

    <!-- 확인 모달 -->
    <div class="modal fade" id="aliceConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content alice-modal-content shadow-lg">
                <div class="alice-modal-icon text-warning"><i class="bi bi-question-circle"></i></div>
                <h5 class="fw-800" id="confirmTitle">확인</h5>
                <p class="small text-secondary mb-4" id="confirmMessage"></p>
                <div class="d-flex gap-2"><button type="button" class="btn btn-light w-50 rounded-pill fw-bold" data-bs-dismiss="modal">취소</button><button type="button" id="confirmOkBtn" class="btn btn-primary w-50 rounded-pill fw-bold">진행</button></div>
            </div>
        </div>
    </div>

    <script id="meds-data" type="application/json">{{ meds_json|safe|default:"[]" }}</script>
    <div id="alarm-badge">ALARM ON</div>
    <div id="alice-quick-menu">
        <a href="{% url 'ai_consult' %}" class="quick-item text-primary"><i class="bi bi-magic me-2"></i> 1:1 AI 상담</a>
        <a href="{% url 'recovery_board' %}" class="quick-item"><i class="bi bi-journal-text me-2"></i> 복구 일지</a>
        <a href="{% url 'smoking_log' %}" class="quick-item text-danger"><i class="bi bi-no-adult me-2"></i> 금연 일지</a>
        <div class="quick-item text-danger border-0" onclick="triggerSOS()"><i class="bi bi-exclamation-triangle me-2"></i> 긴급 SOS 발송</div>
    </div>
    <div id="alice-helper" onclick="toggleQuickMenu()"><i class="bi bi-robot fs-1"></i></div>

    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand text-primary fw-bold" href="/">CareMate AI</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_page' %}">⭐ 마이케어</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'recovery_board' %}">🚑 복구일지</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'recipe_list' %}">🥗 건강식단</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'hospital_map' %}">📍 근처병원</a></li>
                </ul>
                <div class="ms-auto d-flex align-items-center">
                    {% if user.is_authenticated %}
                        <span class="small me-3 fw-bold text-secondary">{{ user.username }} 님</span>
                        {% if user.is_staff %}<a href="{% url 'manager_dashboard' %}" class="btn btn-sm btn-dark rounded-pill px-3 me-2">Manager</a>{% endif %}
                        <form action="{% url 'logout' %}" method="post" class="d-inline">{% csrf_token %}<button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3">로그아웃</button></form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-sm btn-primary rounded-pill px-4">로그인</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    <main class="container mt-3">{% block content %}{% endblock %}</main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const systemModal = new bootstrap.Modal(document.getElementById('aliceSystemModal'));
        const confirmModal = new bootstrap.Modal(document.getElementById('aliceConfirmModal'));
        function showAliceModal(title, msg) { document.getElementById('aliceModalTitle').innerText = title; document.getElementById('aliceModalBody').innerText = msg; systemModal.show(); }
        function showAliceConfirm(title, msg, callback) { document.getElementById('confirmTitle').innerText = title; document.getElementById('confirmMessage').innerText = msg; const okBtn = document.getElementById('confirmOkBtn'); okBtn.onclick = () => { confirmModal.hide(); callback(); }; confirmModal.show(); }
        function showLoading(msg) { document.getElementById('loadingMsg').innerText = msg; document.getElementById('loadingOverlay').style.display = 'flex'; }
        function toggleQuickMenu() { const menu = document.getElementById('alice-quick-menu'); menu.style.display = (menu.style.display === 'block') ? 'none' : 'block'; }
        function aliceSpeak(text) { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'ko-KR'; window.speechSynthesis.speak(msg); }
        try {
            const meds = JSON.parse(document.getElementById('meds-data').textContent || '[]');
            if (meds.length > 0) {
                document.getElementById('alarm-badge').style.display = 'block';
                setInterval(() => {
                    const now = new Date(); const cur = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                    meds.forEach(m => { if (m.time === cur) { showAliceModal("💊 복약 알람", m.name + " 드실 시간입니다!"); aliceSpeak(m.name + " 드실 시간입니다."); m.time = "done"; } });
                }, 30000); 
            }
        } catch (e) {}
        function triggerSOS() { showAliceConfirm('긴급 SOS', '비상 연락처로 주인님의 상태를 전송할까요?', () => { fetch("{% url 'send_sos' %}").then(res => res.json()).then(data => showAliceModal('발송 완료', data.message)); }); }
        {% if messages %}{% for message in messages %}window.addEventListener('DOMContentLoaded', () => showAliceModal('CareMate AI', '{{ message|escapejs }}'));{% endfor %}{% endif %}
    </script>
</body>
</html>
