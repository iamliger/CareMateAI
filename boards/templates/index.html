<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareMate AI - 대시보드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold">CareMate AI</span>
        <div class="d-flex align-items-center">
            <span class="text-white me-3">{{ username }} 님 환영합니다!</span>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-light">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row g-4">
        <div class="col-md-12">
            <div class="p-5 mb-4 bg-white rounded-3 shadow-sm border text-center">
                <i class="bi bi-robot text-primary" style="font-size: 4rem;"></i>
                <h2 class="display-6 fw-bold mt-3">안녕하세요, {{ username }} 님!</h2>
                <p class="fs-5 text-muted">오늘의 건강 상태를 확인하고 전문가와 상담해보세요.</p>
                <hr class="my-4">
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="/community/free" class="btn btn-primary btn-lg px-4 me-md-2">자유게시판</a>
                    <a href="/community/consult" class="btn btn-outline-secondary btn-lg px-4">전문가 상담</a>
                    {% if user.is_staff %}
                    <a href="/admin/" class="btn btn-danger btn-lg px-4">관리자 페이지</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
